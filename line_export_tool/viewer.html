<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Japan Rail Lines Viewer</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      #toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 360px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(20, 24, 33, 0.9);
        color: #fff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }

      #toolbar h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      #toolbar p {
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.4;
      }

      #toolbar .row {
        margin-bottom: 10px;
      }

      #toolbar button,
      #toolbar input[type="file"] {
        width: 100%;
        font-size: 13px;
      }

      #toolbar button {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        background: #2f6fed;
        color: #fff;
        cursor: pointer;
      }

      #toolbar button.secondary {
        background: #4a5568;
      }

      #toolbar code {
        font-size: 12px;
      }

      #status {
        font-size: 12px;
        color: #d8dee9;
        white-space: pre-line;
      }

      #cesiumContainer {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <h1>Japan Rail Lines Viewer</h1>
        <p>
          Cach de mo nhanh:
          <br />
          1. Bam <code>Choose JSON file</code> de mo
          <code>rail_lines_tokyo.json</code> truc tiep tu may.
          <br />
          2. Hoac bam <code>Load bundled sample</code> neu ban dang chay file nay qua local server.
        </p>
        <div class="row">
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
        <div class="row">
          <button id="loadSampleButton">Load bundled sample</button>
        </div>
        <div class="row">
          <button id="clearButton" class="secondary">Clear lines</button>
        </div>
        <div id="status">Chua load du lieu.</div>
      </div>
      <div id="cesiumContainer"></div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const fileInput = document.getElementById("fileInput");
      const loadSampleButton = document.getElementById("loadSampleButton");
      const clearButton = document.getElementById("clearButton");

      const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        shouldAnimate: false,
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        baseLayerPicker: false,
        geocoder: false,
        homeButton: true,
        sceneModePicker: true,
        navigationHelpButton: false,
        infoBox: true,
        selectionIndicator: true,
      });

      viewer.scene.globe.depthTestAgainstTerrain = false;
      viewer.camera.flyHome(0);

      function setBaseLayer(provider) {
        viewer.imageryLayers.removeAll();
        const layer = viewer.imageryLayers.addImageryProvider(provider);
        if (provider.errorEvent) {
          provider.errorEvent.addEventListener((error) => {
            setStatus(
              [
                "Basemap bi loi.",
                `Chi tiet: ${error && error.message ? error.message : "unknown error"}`,
              ].join("\n")
            );
          });
        }
        return layer;
      }

      function createOpenStreetMapProvider() {
        return new Cesium.UrlTemplateImageryProvider({
          url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
          credit: "© OpenStreetMap contributors",
        });
      }

      function initializeBaseMap() {
        try {
          setBaseLayer(createOpenStreetMapProvider());
          setStatus("Da khoi tao basemap: OpenStreetMap");
        } catch (error) {
          setStatus(
            [
              "Khong load duoc basemap.",
              `Chi tiet: ${error.message}`,
            ].join("\n")
          );
        }
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function colorFromKey(key) {
        let hash = 0;
        for (let i = 0; i < key.length; i += 1) {
          hash = key.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash) % 360;
        return Cesium.Color.fromHsl(hue / 360, 0.7, 0.55, 0.95);
      }

      function clearLines() {
        viewer.entities.removeAll();
        setStatus("Da clear tat ca line.");
      }

      function renderRailLines(data, sourceLabel) {
        viewer.entities.removeAll();

        const cartesianPositions = [];
        let prefectureCount = 0;
        let lineCount = 0;
        let sectionCount = 0;

        for (const prefecture of data.prefectures || []) {
          prefectureCount += 1;
          lineCount += prefecture.line_count || 0;
          sectionCount += prefecture.section_count || 0;

          for (const line of prefecture.lines || []) {
            const color = colorFromKey(
              `${prefecture.prefecture_key}|${line.operator_name || ""}|${line.line_name || ""}`
            );

            for (const section of line.sections || []) {
              const flattened = [];
              for (const coord of section.coordinates || []) {
                flattened.push(coord[0], coord[1], coord[2] || 0);
              }

              const positions = Cesium.Cartesian3.fromDegreesArrayHeights(flattened);
              cartesianPositions.push(...positions);

              viewer.entities.add({
                name: `${line.operator_name || ""} ${line.line_name || ""}`.trim(),
                polyline: {
                  positions,
                  width: 3,
                  material: color,
                  clampToGround: false,
                },
                properties: {
                  prefectureKey: prefecture.prefecture_key,
                  prefectureName: prefecture.prefecture_name,
                  lineName: line.line_name,
                  operatorName: line.operator_name,
                  sectionId: section.section_id,
                },
                description: `
                  <table>
                    <tr><th align="left">Prefecture</th><td>${prefecture.prefecture_name}</td></tr>
                    <tr><th align="left">Operator</th><td>${line.operator_name || ""}</td></tr>
                    <tr><th align="left">Line</th><td>${line.line_name || ""}</td></tr>
                    <tr><th align="left">Section</th><td>${section.section_id}</td></tr>
                    <tr><th align="left">Points</th><td>${section.coordinate_count}</td></tr>
                  </table>
                `,
              });
            }
          }
        }

        if (cartesianPositions.length > 0) {
          const sphere = Cesium.BoundingSphere.fromPoints(cartesianPositions);
          viewer.camera.flyToBoundingSphere(sphere, {
            duration: 1.5,
            offset: new Cesium.HeadingPitchRange(0, -1.1, sphere.radius * 1.8),
          });
        }

        setStatus(
          [
            `Nguon: ${sourceLabel}`,
            `Prefectures: ${prefectureCount}`,
            `Lines: ${lineCount}`,
            `Sections: ${sectionCount}`,
            `Entities rendered: ${viewer.entities.values.length}`,
          ].join("\n")
        );
      }

      async function loadBundledSample() {
        try {
          const response = await fetch("./rail_lines_tokyo.json");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          renderRailLines(data, "bundled sample");
        } catch (error) {
          setStatus(
            [
              "Khong load duoc bundled sample.",
              "Neu ban dang mo file bang file://, hay dung Choose JSON file hoac chay local server.",
              `Chi tiet: ${error.message}`,
            ].join("\n")
          );
        }
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          renderRailLines(data, file.name);
        } catch (error) {
          setStatus(`Doc file that bai: ${error.message}`);
        }
      });

      loadSampleButton.addEventListener("click", loadBundledSample);
      clearButton.addEventListener("click", clearLines);
      initializeBaseMap();
    </script>
  </body>
</html>
